name: "Run API tests"
description: "Install deps + run greetings tests"

inputs:
  env:
    required: true

runs:
  using: "composite"

  steps:

    - name: Checkout pipeline repo
      uses: actions/checkout@v6

    - name: Clone test framework repo
      uses: actions/checkout@v6
      with:
        repository: mtararujs/course-js-api-framework
        path: tests

    - name: Info
      shell: bash
      run: echo "Running tests for ${{ inputs.env }}"

    - name: Install dependencies
      working-directory: tests
      shell: bash
      run: npm install

    - name: Run tests
      working-directory: tests
      shell: bash
      run: npm run greetings greetings_${{ inputs.env }}