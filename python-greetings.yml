name: Python Greetings Pipeline

on:
  push:
    branches:
      - main

jobs:

  install-pip-deps:
    runs-on: self-hosted
    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v6

      - name: Clone python-greetings repo
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Install dependencies info
        run: echo "Installing pip dependencies..."

      - name: Create venv
        working-directory: python-greetings
        run: python3 -m venv venv

      - name: Install requirements
        working-directory: python-greetings
        run: ./venv/bin/python -m pip install -r requirements.txt


  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - run: echo "Deploying to DEV environment..."
      - uses: ./.github/actions/deploy
        with:
          env: dev
          port: 7001


  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - run: echo "Running DEV tests..."
      - uses: ./.github/actions/test
        with:
          env: dev


  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - run: echo "Deploying to STG environment..."
      - uses: ./.github/actions/deploy
        with:
          env: stg
          port: 7002


  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps:
      - run: echo "Running STG tests..."
      - uses: ./.github/actions/test
        with:
          env: stg


  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - run: echo "Deploying to PREPROD environment..."
      - uses: ./.github/actions/deploy
        with:
          env: preprod
          port: 7003


  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps:
      - run: echo "Running PREPROD tests..."
      - uses: ./.github/actions/test
        with:
          env: preprod


  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod
    steps:
      - run: echo "Deploying to PROD environment..."
      - uses: ./.github/actions/deploy
        with:
          env: prod
          port: 7004


  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod
    steps:
      - run: echo "Running PREPROD tests..."
      - uses: ./.github/actions/test
        with:
          env: prod
